<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小红书 Demo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- ===== BASE SCREEN: 首页 ===== -->
    <div id="screen-home" class="screen base">

      <!-- Header -->
      <div class="home-header">
        <div class="home-header-row">
          <!-- 点点AI 入口 -->
          <button class="dd-icon-btn" onclick="Nav.push('screen-diandian', {})">
            <img src="docs/screenshots/diandianicon.png" class="dd-avatar-img" alt="点点">
          </button>
          <!-- 中间 Tabs -->
          <div class="center-tabs">
            <span class="home-tab">关注</span>
            <span class="home-tab active">发现</span>
            <span class="home-tab">附近</span>
          </div>
          <!-- 搜索 -->
          <button class="header-search-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
          </button>
        </div>
        <div class="header-divider"></div>
      </div>

      <!-- Feed area (shown when home active) -->
      <div id="feed-area" class="page-body">
        <div id="home-feed" class="feed"></div>
      </div>

      <!-- Messages area (shown when messages tab active) -->
      <div id="messages-area" class="page-body" style="display:none;"></div>

      <!-- Bottom Nav -->
      <div class="bottom-nav">
        <button class="nav-item active" id="nav-home">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>首页</span>
        </button>
        <button class="nav-item" id="nav-shop">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.8" stroke-linecap="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          <span>逛逛</span>
        </button>
        <div class="nav-publish">
          <button class="publish-btn">
            <span class="publish-icon">+</span>
          </button>
        </div>
        <button class="nav-item" id="nav-messages">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>消息</span>
        </button>
        <button class="nav-item" id="nav-profile">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>我</span>
        </button>
      </div>

    </div><!-- /screen-home -->

    <!-- ===== OVERLAY: 笔记详情页 ===== -->
    <div id="screen-note-detail" class="screen overlay"></div>

    <!-- ===== OVERLAY: Skill 详情页 ===== -->
    <div id="screen-skill-detail" class="screen overlay"></div>

    <!-- ===== OVERLAY: 点点AI 主页 ===== -->
    <div id="screen-diandian" class="screen overlay"></div>

    <!-- ===== OVERLAY: Skill 对话页 ===== -->
    <div id="screen-skill-chat" class="screen overlay"></div>

    <!-- ===== OVERLAY: Skill 创作 Step 1 ===== -->
    <div id="screen-creation-1" class="screen overlay"></div>

    <!-- ===== OVERLAY: Skill 创作 Step 2 ===== -->
    <div id="screen-creation-2" class="screen overlay"></div>

    <!-- ===== OVERLAY: Skill 创作 Step 3 ===== -->
    <div id="screen-creation-3" class="screen overlay"></div>

    <!-- ===== OVERLAY: Skill 创作 Step 4 ===== -->
    <div id="screen-creation-4" class="screen overlay"></div>

  </div><!-- /app -->

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
