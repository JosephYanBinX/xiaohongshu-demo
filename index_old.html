<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #FF2442;
    --gray: #999;
    --bg: #f0f0f0;
    --white: #fff;
    --text: #1a1a1a;
    --text2: #555;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    max-width: 390px;
    margin: 0 auto;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .page { display: none; }
  .page.active { display: block; }

  /* ===== HEADER ===== */
  .header {
    background: var(--white);
    padding: 10px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  /* AI chatbot 入口 */
  .ai-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* 中间 tabs */
  .center-tabs {
    flex: 1;
    display: flex;
    justify-content: center;
    gap: 24px;
  }

  .tab {
    font-size: 16px;
    color: #aaa;
    cursor: pointer;
    padding-bottom: 2px;
    font-weight: 500;
    position: relative;
    white-space: nowrap;
  }

  .tab.active {
    color: var(--text);
    font-weight: 700;
    font-size: 17px;
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 22px;
    height: 3px;
    background: var(--red);
    border-radius: 2px;
  }

  /* 右边搜索 */
  .search-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .header-divider {
    height: 1px;
    background: #f0f0f0;
    margin: 8px -16px 0;
  }

  /* ===== FEED 双列 ===== */
  .feed {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding: 6px;
    background: var(--bg);
  }

  /* ---- 图片卡（左列为主）---- */
  .img-card {
    background: var(--white);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .img-card:active { transform: scale(0.97); }

  .img-card .card-cover {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    position: relative;
  }

  .video-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    background: rgba(0,0,0,0.45);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .img-card .card-body {
    padding: 8px 8px 10px;
  }

  .img-card .card-title {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }

  /* ---- 通用 meta 行 ---- */
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-author {
    display: flex;
    align-items: center;
    gap: 5px;
    min-width: 0;
  }

  .author-avatar-mini {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
  }

  .author-name-mini {
    font-size: 11px;
    color: var(--gray);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .like-count {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    color: var(--gray);
    flex-shrink: 0;
  }

  /* ===== TABBAR ===== */
  .tabbar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 390px;
    background: var(--white);
    border-top: 1px solid #ebebeb;
    display: flex;
    align-items: center;
    padding: 8px 0 22px;
    z-index: 200;
  }

  .tabbar-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    color: var(--gray);
    cursor: pointer;
  }

  .tabbar-item.active { color: var(--text); font-weight: 600; }

  .tabbar-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .plus-btn {
    width: 48px;
    height: 32px;
    background: var(--red);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .plus-btn svg { display: block; }

  /* ===== DETAIL PAGE ===== */
  #detail-page {
    background: var(--white);
    min-height: 100vh;
    padding-bottom: 88px;
  }

  .detail-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(12px);
    z-index: 100;
    border-bottom: 1px solid #f5f5f5;
  }

  .back-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 50%;
  }
  .back-btn:active { background: #f5f5f5; }

  .detail-header-title {
    flex: 1;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
  }

  .detail-header-more {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .detail-cover {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .detail-body { padding: 14px 16px; }

  .detail-author-row {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
  }

  .detail-avatar-wrap {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin-right: 10px;
    flex-shrink: 0;
  }

  .detail-author-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .detail-author-fans { font-size: 11px; color: var(--gray); margin-top: 2px; }

  .follow-btn {
    margin-left: auto;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  .follow-btn.following { background: #f2f2f2; color: var(--gray); }

  .detail-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .detail-content {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.85;
    margin-bottom: 12px;
  }

  .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

  .tag {
    background: #fff0f2;
    color: var(--red);
    border-radius: 12px;
    padding: 4px 10px;
    font-size: 12px;
  }

  .detail-meta-row {
    font-size: 12px;
    color: #bbb;
    margin-bottom: 4px;
  }

  /* 评论 */
  .comments-section { border-top: 8px solid #f5f5f5; }

  .comments-header {
    padding: 14px 16px 8px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .comment-item {
    padding: 10px 16px;
    display: flex;
    gap: 10px;
  }

  .comment-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .comment-body { flex: 1; }
  .comment-name { font-size: 12px; color: var(--gray); margin-bottom: 4px; }
  .comment-text { font-size: 13.5px; color: var(--text); line-height: 1.6; }

  .comment-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
  }

  .comment-time { font-size: 11px; color: #ccc; }

  .comment-like {
    display: flex; align-items: center; gap: 3px;
    font-size: 11px; color: var(--gray);
  }

  /* 详情底部操作栏 */
  .detail-action-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 390px;
    background: white;
    border-top: 1px solid #ebebeb;
    display: flex;
    align-items: center;
    padding: 10px 14px 28px;
    gap: 10px;
    z-index: 200;
  }

  .comment-input-box {
    flex: 1;
    background: #f5f5f5;
    border-radius: 20px;
    padding: 9px 14px;
    font-size: 13px;
    color: var(--gray);
  }

  .action-icons-row { display: flex; gap: 14px; }

  .act-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 10px;
    color: var(--gray);
    cursor: pointer;
    transition: transform 0.15s;
  }

  .act-icon.liked { color: var(--red); }
  .act-icon.collected { color: #ffb400; }

  /* 动画 */
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  #detail-page.sliding-in { animation: slideIn 0.25s cubic-bezier(.25,.46,.45,.94); }
</style>
</head>

// ===== 渲染首页 =====
function renderFeed() {
  const feed = document.getElementById('note-feed');
  feed.innerHTML = notes.map(n => renderImgCard(n)).join('');
}

function renderImgCard(n) {
  return `
    <div class="img-card" onclick="openDetail(${n.id})">
      <div class="card-cover" style="height:${n.coverH}px;background:${n.coverBg};">
        ${n.coverEmoji}
        ${n.isVideo ? `<div class="video-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${n.title}</div>
        <div class="card-meta">
          <div class="card-author">
            <div class="author-avatar-mini" style="background:${n.author.avatarBg}">${n.author.emoji}</div>
            <span class="author-name-mini">${n.author.name}</span>
          </div>
          <div class="like-count">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            ${formatNum(n.likes)}
          </div>
        </div>
      </div>
    </div>`;
}

// ===== 详情页 =====
let currentNote = null;

function openDetail(id) {
  currentNote = notes.find(n => n.id === id);
  const n = currentNote;

  // 封面
  document.getElementById('detail-cover').innerHTML = `
    <div style="width:100%;height:320px;background:${n.coverBg};display:flex;align-items:center;justify-content:center;font-size:96px;">
      ${n.coverEmoji}
    </div>`;

  // 作者
  document.getElementById('d-avatar').style.background = n.author.avatarBg;
  document.getElementById('d-avatar').textContent = n.author.emoji;
  document.getElementById('d-name').textContent = n.author.name;
  document.getElementById('d-fans').textContent = '点击查看主页';

  // 内容
  document.getElementById('d-title').textContent = n.title;
  document.getElementById('d-content').innerHTML = (n.content || '').replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  document.getElementById('d-tags').innerHTML = (n.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('d-meta').textContent = `${formatNum(n.likes)} 人点赞 · 2026-03-18 发布`;

  // 操作栏
  document.getElementById('like-count').textContent = formatNum(n.likes);
  document.getElementById('collect-count').textContent = formatNum(n.collectCount);
  document.getElementById('comment-count').textContent = formatNum(n.commentCount);
  document.getElementById('like-action').classList.remove('liked');
  document.getElementById('collect-action').classList.remove('collected');

  const fb = document.getElementById('follow-btn');
  fb.textContent = '+ 关注';
  fb.classList.remove('following');

  // 评论
  document.getElementById('c-header').textContent = `${formatNum(n.commentCount)} 条评论`;
  document.getElementById('c-list').innerHTML = (n.comments || []).map(c => `
    <div class="comment-item">
      <div class="comment-avatar">${c.emoji}</div>
      <div class="comment-body">
        <div class="comment-name">${c.name}</div>
        <div class="comment-text">${c.text}</div>
        <div class="comment-footer">
          <span class="comment-time">${c.time}</span>
          <span class="comment-like">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            ${c.likes}
          </span>
        </div>
      </div>
    </div>`).join('');

  // 切页
  document.getElementById('home-page').classList.remove('active');
  const dp = document.getElementById('detail-page');
  dp.classList.add('active', 'sliding-in');
  dp.scrollTop = 0;
  setTimeout(() => dp.classList.remove('sliding-in'), 300);
}

function goBack() {
  document.getElementById('detail-page').classList.remove('active');
  document.getElementById('home-page').classList.add('active');
}

function toggleFollow(btn) {
  btn.classList.toggle('following');
  btn.textContent = btn.classList.contains('following') ? '已关注' : '+ 关注';
}

function toggleLike() {
  const btn = document.getElementById('like-action');
  const isLiked = btn.classList.toggle('liked');
  document.getElementById('like-count').textContent = formatNum(currentNote.likes + (isLiked ? 1 : 0));
  btn.style.transform = 'scale(1.35)';
  setTimeout(() => btn.style.transform = '', 150);
}

function toggleCollect() {
  const btn = document.getElementById('collect-action');
  const isC = btn.classList.toggle('collected');
  document.getElementById('collect-count').textContent = formatNum(currentNote.collectCount + (isC ? 1 : 0));
  btn.style.transform = 'scale(1.35)';
  setTimeout(() => btn.style.transform = '', 150);
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function formatNum(n) {
  if (n >= 10000) return (n / 10000).toFixed(1) + '万';
  return String(n);
}

renderFeed();
</script>
